name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # Cross-compile for all platforms from single runner
      - name: Build macOS ARM64
        run: bun build --compile --target=bun-darwin-arm64 ./src/main-bun.ts --outfile dist/leader-app-darwin-arm64

      - name: Build macOS x64
        run: bun build --compile --target=bun-darwin-x64 ./src/main-bun.ts --outfile dist/leader-app-darwin-x64

      - name: Build Windows x64
        run: bun build --compile --target=bun-windows-x64 ./src/main-bun.ts --outfile dist/leader-app-windows-x64.exe

      # Create archives with public/ included
      - name: Create archives
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # macOS ARM64
          mkdir -p staging/leader-app
          cp dist/leader-app-darwin-arm64 staging/leader-app/leader-app
          cp -r public staging/leader-app/public
          cd staging && tar czf ../dist/leader-app-${VERSION}-darwin-arm64.tar.gz leader-app && cd ..
          rm -rf staging/leader-app

          # macOS x64
          mkdir -p staging/leader-app
          cp dist/leader-app-darwin-x64 staging/leader-app/leader-app
          cp -r public staging/leader-app/public
          cd staging && tar czf ../dist/leader-app-${VERSION}-darwin-x64.tar.gz leader-app && cd ..
          rm -rf staging/leader-app

          # Windows x64
          mkdir -p staging/leader-app
          cp dist/leader-app-windows-x64.exe staging/leader-app/leader-app.exe
          cp -r public staging/leader-app/public
          cd staging && zip -r ../dist/leader-app-${VERSION}-windows-x64.zip leader-app && cd ..
          rm -rf staging/leader-app

      - name: Create Release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2
        with:
          generate_release_notes: true
          files: |
            dist/leader-app-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz
            dist/leader-app-${{ steps.version.outputs.VERSION }}-darwin-x64.tar.gz
            dist/leader-app-${{ steps.version.outputs.VERSION }}-windows-x64.zip
